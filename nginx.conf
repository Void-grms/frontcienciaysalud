server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compresion para activos estaticos
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
  gzip_min_length 1024;
  gzip_vary on;

  # Security headers globales. La CSP la maneja el backend con helmet; aqui
  # solo agregamos los headers que aplican al hosting estatico.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Healthcheck endpoint sin pasar por index.html.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # Activos versionados (hashes en el filename) -> cache largo + immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback: cualquier ruta no encontrada cae en index.html para que el
  # router del cliente la maneje. No cacheamos el HTML para que despues de un
  # deploy el browser tome el index.html nuevo y sus referencias a /assets/*
  # versionados.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
